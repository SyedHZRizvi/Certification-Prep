    .hero-rainbow .rb {
      display: inline-block;
      /* padding-bottom extends the box below the baseline so descenders
         (g, y, p, q) fall inside the span's paint area — without this,
         -webkit-background-clip:text clips gradient at the baseline and
         the bottom of letters like "g" in "Big" disappears. */
      padding-bottom: 0.18em;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      background-size: 200% auto;
      animation: rb-shimmer 8s linear infinite;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.25));
    }
    /* Premium unified gradient — every word shares the SAME indigo →
       violet → fuchsia → rose flow with depth stops (light/mid/dark
       within the same hue family). Symmetric, professional, modern —
       the kind of headline gradient used by Stripe, Linear, Apple,
       Vercel for hero typography. No rainbow chaos. */
    .hero-rainbow .rb1, .hero-rainbow .rb2, .hero-rainbow .rb3,
    .hero-rainbow .rb4, .hero-rainbow .rb5, .hero-rainbow .rb6 {
      background-image: linear-gradient(
        135deg,
        #4338ca   0%,   /* deep indigo */
        #6366f1  15%,   /* indigo */
        #8b5cf6  30%,   /* violet */
        #a855f7  45%,   /* purple */
        #d946ef  60%,   /* fuchsia */
        #ec4899  75%,   /* pink */
        #f43f5e  90%,   /* rose */
        #fb7185 100%    /* light rose accent */
      );
    }
    /* Stagger the shimmer so each word feels alive without breaking
       the unified palette. */
    .hero-rainbow .rb1 { animation-delay: 0s;    }
    .hero-rainbow .rb2 { animation-delay: .3s;   }
    .hero-rainbow .rb3 { animation-delay: .6s;   }
    .hero-rainbow .rb4 { animation-delay: .9s;   }
    .hero-rainbow .rb5 { animation-delay: 1.2s;  }
    .hero-rainbow .rb6 { animation-delay: 1.5s;  }

    @keyframes rb-shimmer {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
