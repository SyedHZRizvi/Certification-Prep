# Cloudflare Pages Functions config — The Cert Hub auth layer.
#
# This file is read by:
#   - Cloudflare Pages (when deploying via Git integration — auto-detected)
#   - `wrangler pages dev` for local development
#   - `wrangler pages deploy` for direct CLI deploys
#
# The Pages dashboard's "Settings → Functions → KV namespace bindings" UI
# is the source of truth in production. This file documents the expected
# binding names for local dev and CI.

name = "cert-hub"
compatibility_date = "2025-09-01"
pages_build_output_dir = "_site"

# KV binding: maps the binding name USERS_KV (used in functions/lib/kv.js)
# to a Cloudflare KV namespace. The actual namespace id is set in the
# Pages dashboard (or via `wrangler kv:namespace create CERT_HUB_USERS`).
#
# For local dev with `wrangler pages dev`, override the id below to your
# own dev namespace and uncomment.
#
# [[kv_namespaces]]
# binding = "USERS_KV"
# id = "REPLACE_WITH_NAMESPACE_ID"

# Environment variable defaults. Override in the Pages dashboard or via
# `wrangler pages secret put <name>` for production. NEVER commit secrets.
[vars]
MAGIC_LINK_TTL_SECONDS = "900"
SESSION_TTL_SECONDS = "2592000"
EMAIL_FROM = "onboarding@resend.dev"
# SITE_URL is set automatically by Pages to the deployment URL; override
# only when running locally or pointing magic links at a custom domain.

# Secrets to set via `wrangler pages secret put <name>` (NOT in this file):
#   - JWT_SECRET        — 64 hex chars, e.g. `openssl rand -hex 32`
#   - RESEND_API_KEY    — from https://resend.com/api-keys
#   - SITE_URL          — only if overriding the auto-detected value
