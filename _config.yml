# Jekyll config for GitHub Pages
title: "The Cert Hub — 39 Certification Study Courses"
description: "Story-driven self-study courses for 32 industry certifications spanning Project Management (Scrum PSM I, PMP), IT Systems Administration (CompTIA A+, Network+, Linux+, Server+, Security+ SY0-701), Cloud (AWS CLF-C02, SAA-C03; Azure AZ-900, AZ-104), Microsoft enterprise (Windows Server AZ-800/801, Endpoint MD-102, Identity SC-300), Generative & Agentic AI (Claude Architect, Prompt Engineering Specialist, Generative AI Engineer, Google AI Pro for Gemini + Vertex AI + Google Generative AI Leader + PMLE, AWS ML Specialty MLS-C01, AWS AI Practitioner AIF-C01, Azure AI Engineer AI-102), Supply Chain (ASCM CSCP, CPIM, CLTD; ISM CPSM), AI Digital Marketing (5-course ladder), Bitcoin & Cryptocurrency, and E-Commerce. Designed and authored by Humayun Zafar — inspired by the teaching philosophies of the world's leading research universities."
author: "Humayun Zafar"
url: "https://syedhzrizvi.github.io"
baseurl: "/Certification-Prep"

# Markdown engine
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

# Plugins (whitelisted by GitHub Pages)
plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index

# Auto-convert .md links inside markdown content to clean .html links
relative_links:
  enabled: true
  collections: true

# Treat all .md files as Jekyll pages even without front matter
optional_front_matter:
  remove_originals: true
  enabled: true

# Pretty URLs (so /folder/file shows up cleanly without .md)
permalink: pretty

# Apply our custom protected layout to every markdown page
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# Don't process these in Jekyll build
exclude:
  - LICENSE
  - .gitignore
  - .gitattributes
  - Gemfile
  - Gemfile.lock
  - vendor
  - Privacy-Setup    # internal admin notes — not for public site
  - functions        # Cloudflare Pages Functions — Jekyll must not process server-side JS
  - node_modules

# Make sure Jekyll picks up all the markdown
include:
  - "*.md"

# SEO
twitter:
  username: SyedHZRizvi
  card: summary_large_image
