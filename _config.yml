# Jekyll config for GitHub Pages
title: "The Cert Hub — Scrum Master & PMP Course"
description: "A complete self-study course for the Scrum Master (PSM I) and PMP exams, designed and authored by Syed HZ Rizvi."
author: "Syed HZ Rizvi"
url: "https://syedhzrizvi.github.io"
baseurl: "/Certification-Prep"

# Markdown engine
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

# Pretty URLs (so /folder/file.md shows up cleanly)
permalink: pretty

# Apply our custom protected layout to every markdown page
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# Don't process these in Jekyll build
exclude:
  - LICENSE
  - .gitignore
  - .gitattributes
  - Gemfile
  - Gemfile.lock
  - vendor

# Make sure Jekyll picks up all the markdown
include:
  - "*.md"

# SEO
twitter:
  username: SyedHZRizvi
  card: summary_large_image
