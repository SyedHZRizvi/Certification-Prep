# Jekyll config for GitHub Pages
title: "The Cert Hub — Scrum Master & PMP Course"
description: "A complete self-study course for the Scrum Master (PSM I) and PMP exams, designed and authored by Syed HZ Rizvi."
author: "Syed HZ Rizvi"
url: "https://syedhzrizvi.github.io"
baseurl: "/Certification-Prep"

# Markdown engine
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

# Plugins (whitelisted by GitHub Pages)
plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index

# Auto-convert .md links inside markdown content to clean .html links
relative_links:
  enabled: true
  collections: true

# Treat all .md files as Jekyll pages even without front matter
optional_front_matter:
  remove_originals: true
  enabled: true

# Pretty URLs (so /folder/file shows up cleanly without .md)
permalink: pretty

# Apply our custom protected layout to every markdown page
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# Don't process these in Jekyll build
exclude:
  - LICENSE
  - .gitignore
  - .gitattributes
  - Gemfile
  - Gemfile.lock
  - vendor
  - Privacy-Setup    # internal admin notes — not for public site

# Make sure Jekyll picks up all the markdown
include:
  - "*.md"

# SEO
twitter:
  username: SyedHZRizvi
  card: summary_large_image
