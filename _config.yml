# Jekyll config for GitHub Pages
title: "The Cert Hub — 13 Certification Study Courses"
description: "Story-driven self-study courses for 13 industry certifications — Scrum (PSM I), PMP, AWS (CLF-C02, SAA-C03, AIF-C01), Azure (AZ-900, AZ-104, AI-102), CompTIA Security+ (SY0-701), and ASCM/ISM supply chain (CSCP, CPIM, CLTD, CPSM). Designed and authored by Humayun Zafar."
author: "Humayun Zafar"
url: "https://syedhzrizvi.github.io"
baseurl: "/Certification-Prep"

# Markdown engine
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

# Plugins (whitelisted by GitHub Pages)
plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index

# Auto-convert .md links inside markdown content to clean .html links
relative_links:
  enabled: true
  collections: true

# Treat all .md files as Jekyll pages even without front matter
optional_front_matter:
  remove_originals: true
  enabled: true

# Pretty URLs (so /folder/file shows up cleanly without .md)
permalink: pretty

# Apply our custom protected layout to every markdown page
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# Don't process these in Jekyll build
exclude:
  - LICENSE
  - .gitignore
  - .gitattributes
  - Gemfile
  - Gemfile.lock
  - vendor
  - Privacy-Setup    # internal admin notes — not for public site
  - functions        # Cloudflare Pages Functions — Jekyll must not process server-side JS
  - node_modules

# Make sure Jekyll picks up all the markdown
include:
  - "*.md"

# SEO
twitter:
  username: SyedHZRizvi
  card: summary_large_image
